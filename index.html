<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MindFlow — 마인드맵 + 할 일</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f0;
  --surface: #ffffff;
  --surface2: #eeeee8;
  --border: #ddd9d0;
  --border-strong: #c5c0b6;
  --text: #2c2c2c;
  --text-dim: #8a8578;
  --accent: #4a6cf7;
  --accent-light: rgba(74,108,247,0.07);
  --accent-glow: rgba(74,108,247,0.18);
  --accent3: #2a9d6e;
  --accent3-light: rgba(42,157,110,0.07);
  --accent3-border: rgba(42,157,110,0.35);
  --danger: #d94444;
  --radius: 8px;
  --font: 'Noto Sans KR', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --sh-sm: 0 1px 3px rgba(0,0,0,0.06);
  --sh-md: 0 4px 16px rgba(0,0,0,0.08);
  --sh-lg: 0 8px 32px rgba(0,0,0,0.1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw;
  -webkit-user-select:none;user-select:none;touch-action:none}

#canvas{position:absolute;top:0;left:0;width:100%;height:100%;cursor:grab;
  background-image:radial-gradient(circle,var(--border) .8px,transparent .8px);background-size:28px 28px}
#canvas.grabbing{cursor:grabbing}

svg#lines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
svg#lines path{fill:none;stroke:var(--border-strong);stroke-width:2;stroke-linecap:round}

.node{position:absolute;z-index:10;min-width:70px;max-width:260px;cursor:pointer;
  -webkit-user-select:none;user-select:none;touch-action:none}
.node-inner{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);
  padding:9px 13px;display:flex;align-items:center;gap:7px;position:relative;
  transition:border-color .15s,box-shadow .15s;box-shadow:var(--sh-sm)}
.node:hover .node-inner{border-color:var(--accent);box-shadow:var(--sh-md)}

.node.root .node-inner{background:var(--accent);border-color:var(--accent);padding:12px 18px;
  box-shadow:0 3px 12px rgba(74,108,247,.25)}
.node.root .node-label{color:#fff;font-weight:700;font-size:15px}

.node.todo .node-inner{background:var(--accent3-light);border-color:var(--accent3-border)}
.node.todo.done .node-inner{opacity:.45}
.node.todo.done .node-label{text-decoration:line-through;color:var(--text-dim)}
.node.selected .node-inner{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow),var(--sh-md)}

.node-label{font-size:13px;font-weight:400;color:var(--text);outline:none;min-width:20px;
  word-break:break-word;line-height:1.4;-webkit-user-select:text;user-select:text}

.todo-check{width:17px;height:17px;min-width:17px;border-radius:4px;border:2px solid var(--accent3);
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;flex-shrink:0}
.todo-check:hover{background:rgba(42,157,110,.12)}
.todo-check.checked{background:var(--accent3);border-color:var(--accent3)}
.todo-check.checked::after{content:'✓';color:#fff;font-size:11px;font-weight:700}

.collapse-btn{width:20px;height:20px;min-width:20px;border-radius:50%;border:1.5px solid var(--border);
  background:var(--surface2);color:var(--text-dim);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:10px;font-weight:700;transition:all .15s;flex-shrink:0}
.collapse-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.collapse-btn .arrow{display:inline-block;transition:transform .2s}
.collapse-btn .arrow.collapsed{transform:rotate(-90deg)}

.node-actions{position:absolute;right:-8px;top:50%;transform:translateY(-50%) translateX(100%);
  display:none;gap:3px;z-index:20}
.node:hover .node-actions,.node.selected .node-actions{display:flex}
.node-action-btn{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);
  color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;
  transition:all .15s;box-shadow:var(--sh-sm)}
.node-action-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.node-action-btn.danger:hover{background:var(--danger);border-color:var(--danger)}

.children-count{position:absolute;right:-6px;bottom:-6px;background:var(--accent);color:#fff;
  font-size:9px;font-weight:700;font-family:var(--mono);width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;box-shadow:var(--sh-sm);z-index:15}

#toolbar{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:1px;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3px;box-shadow:var(--sh-lg)}
.tb-btn{padding:7px 12px;background:none;border:none;color:var(--text-dim);font-family:var(--font);
  font-size:12px;font-weight:500;cursor:pointer;border-radius:7px;transition:all .15s;
  display:flex;align-items:center;gap:4px;white-space:nowrap}
.tb-btn:hover{background:var(--surface2);color:var(--text)}
.tb-btn svg{width:15px;height:15px}
.tb-sep{width:1px;background:var(--border);margin:4px 1px}

#todo-panel{position:fixed;top:0;right:0;width:300px;height:100vh;background:var(--surface);
  border-left:1px solid var(--border);z-index:90;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 24px rgba(0,0,0,.06)}
#todo-panel.open{transform:translateX(0)}
.panel-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-header h2{font-size:14px;font-weight:700;color:var(--accent3);display:flex;align-items:center;gap:8px}
.panel-header .count{font-family:var(--mono);font-size:11px;background:rgba(42,157,110,.1);padding:2px 8px;border-radius:10px;color:var(--accent3)}
.panel-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:18px;padding:4px;border-radius:4px}
.panel-close:hover{color:var(--text)}
.todo-list{flex:1;overflow-y:auto;padding:10px}

.todo-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;
  cursor:grab;transition:background .12s,transform .15s,box-shadow .15s;margin-bottom:2px;
  position:relative;touch-action:none}
.todo-item:hover{background:var(--surface2)}
.todo-item.dragging{opacity:.85;box-shadow:var(--sh-md);background:var(--surface);z-index:10;transform:scale(1.02)}
.todo-item .drag-handle{color:var(--border-strong);font-size:14px;cursor:grab;flex-shrink:0;
  display:flex;align-items:center;padding:0 2px;touch-action:none}
.todo-item .path{font-size:10px;color:var(--text-dim);font-family:var(--mono);margin-top:2px}
.todo-item-label{font-size:13px;line-height:1.3}
.todo-drop-indicator{height:2px;background:var(--accent);border-radius:1px;margin:0 12px;
  transition:opacity .15s;opacity:0;pointer-events:none}
.todo-drop-indicator.visible{opacity:1}
.todo-empty{padding:40px 20px;text-align:center;color:var(--text-dim);font-size:13px;line-height:1.7}

.done-section{border-top:1px solid var(--border);margin-top:8px;padding-top:4px}
.done-section-header{display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px 4px;cursor:pointer;user-select:none}
.done-section-header h3{font-size:11px;font-weight:600;color:var(--text-dim);
  display:flex;align-items:center;gap:6px}
.done-section-header .toggle-arrow{font-size:9px;transition:transform .2s}
.done-section-header .toggle-arrow.collapsed{transform:rotate(-90deg)}
.dtree-node{overflow:hidden}
.dtree-row{display:flex;align-items:center;gap:5px;padding:5px 12px;cursor:pointer;
  font-size:11px;font-weight:600;color:var(--text-dim);border-radius:5px;
  transition:background .1s;user-select:none}
.dtree-row:hover{background:var(--surface2);color:var(--text)}
.dtree-row .toggle-arrow{font-size:9px;display:inline-block;transition:transform .15s;flex-shrink:0}
.dtree-y{font-size:12px;color:var(--text);font-weight:700}
.dtree-m{font-size:11px}
.dtree-d{font-size:11px;font-weight:500}
.dtree-count{font-family:var(--mono);font-size:9px;opacity:.45;font-weight:400;margin-left:2px}
.done-item{display:flex;align-items:center;gap:10px;padding:6px 12px;border-radius:7px;
  cursor:pointer;transition:background .12s;margin-bottom:1px;opacity:.6;padding-left:24px}
.done-item:hover{background:var(--surface2);opacity:.8}
.done-item .done-item-label{font-size:12px;line-height:1.3;text-decoration:line-through;color:var(--text-dim)}
.done-item .path{font-size:9px;color:var(--text-dim);font-family:var(--mono);margin-top:1px}

.ctx-menu{position:fixed;z-index:200;background:var(--surface);border:1px solid var(--border);
  border-radius:9px;padding:4px;min-width:190px;box-shadow:var(--sh-lg);display:none}
.ctx-menu.show{display:block}
.ctx-item{padding:7px 12px;font-size:12px;font-family:var(--font);color:var(--text);cursor:pointer;
  border-radius:5px;display:flex;align-items:center;gap:8px;transition:background .1s}
.ctx-item:hover{background:var(--surface2)}
.ctx-item.danger{color:var(--danger)}
.ctx-item .sc{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text-dim)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--text);color:var(--bg);padding:10px 22px;border-radius:8px;font-size:13px;
  z-index:300;transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:var(--sh-lg)}
.toast.show{transform:translateX(-50%) translateY(0)}

.help-hint{position:fixed;bottom:16px;left:16px;z-index:80;font-size:10px;color:var(--text-dim);line-height:2;font-family:var(--mono)}
.help-hint kbd{background:var(--surface);border:1px solid var(--border);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:10px}
#search-bar{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:100;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  box-shadow:var(--sh-lg);width:320px;display:none;flex-direction:column;overflow:hidden}
#search-bar.open{display:flex}
#search-bar input{border:none;outline:none;padding:10px 14px;font-family:var(--font);font-size:13px;
  background:transparent;color:var(--text);width:100%}
#search-bar input::placeholder{color:var(--text-dim)}
.search-results{max-height:220px;overflow-y:auto;border-top:1px solid var(--border)}
.search-result{padding:8px 14px;cursor:pointer;font-size:12px;transition:background .1s;
  display:flex;flex-direction:column;gap:2px}
.search-result:hover,.search-result.active{background:var(--accent-light)}
.search-result .sr-label{font-weight:500;color:var(--text)}
.search-result .sr-path{font-size:10px;color:var(--text-dim);font-family:var(--mono)}
.search-result mark{background:rgba(74,108,247,0.2);color:var(--accent);border-radius:2px;padding:0 1px}
.search-empty{padding:16px 14px;text-align:center;color:var(--text-dim);font-size:12px}
.node.search-highlight .node-inner{border-color:var(--accent)!important;box-shadow:0 0 0 3px var(--accent-glow),0 0 16px var(--accent-glow)!important}
#file-input{display:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

@media(max-width:768px){
  .node-actions{display:none!important}
  .help-hint{display:none}
  #toolbar{padding:2px;gap:0}
  .tb-btn{padding:6px 8px;font-size:11px;gap:3px}
  .tb-btn svg{width:13px;height:13px}
}
</style>
</head>
<body>
<div id="canvas"><svg id="lines"></svg></div>

<div id="toolbar">
  <button class="tb-btn" onclick="addChild()" title="Tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>추가
  </button><div class="tb-sep"></div>
  <button class="tb-btn" onclick="toggleTodoSel()" title="T">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/></svg>할 일
  </button><div class="tb-sep"></div>
  <button class="tb-btn" onclick="toggleCollapseSel()" title="C">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>접기
  </button><div class="tb-sep"></div>
  <button class="tb-btn" onclick="togglePanel()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="5" rx="1"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="7" y1="16" x2="14" y2="16"/></svg>목록
  </button><div class="tb-sep"></div>
  <button class="tb-btn" onclick="exportJSON()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>저장
  </button>
  <button class="tb-btn" onclick="document.getElementById('file-input').click()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>불러오기
  </button><div class="tb-sep"></div>
  <button class="tb-btn" onclick="toggleSearch()" title="Ctrl+F">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>검색
  </button>
  <input type="file" id="file-input" accept=".json" onchange="importJSON(event)">
</div>

<div id="search-bar">
  <input type="text" id="search-input" placeholder="노드 이름 검색..." autocomplete="off">
  <div class="search-results" id="search-results"></div>
</div>

<div id="todo-panel">
  <div class="panel-header">
    <h2>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/></svg>
      할 일 <span class="count" id="todo-count">0</span>
    </h2>
    <button class="panel-close" onclick="togglePanel()">✕</button>
  </div>
  <div class="todo-list" id="todo-list"></div>
</div>

<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-item" onclick="ctxAct('child')">➕ 자식 노드 추가 <span class="sc">Tab</span></div>
  <div class="ctx-item" onclick="ctxAct('sibling')">↔️ 형제 노드 추가 <span class="sc">Enter</span></div>
  <div class="ctx-item" onclick="ctxAct('todo')">☑️ 할 일 토글 <span class="sc">T</span></div>
  <div class="ctx-item" onclick="ctxAct('collapse')">📁 접기/펼치기 <span class="sc">C</span></div>
  <div class="ctx-item" onclick="ctxAct('edit')">✏️ 이름 수정 <span class="sc">F2</span></div>
  <div class="ctx-item danger" onclick="ctxAct('delete')">🗑️ 삭제 <span class="sc">Del</span></div>
</div>

<div class="toast" id="toast"></div>
<div class="help-hint"><kbd>Tab</kbd> 자식 추가 &nbsp; <kbd>Enter</kbd> 형제 추가 &nbsp; <kbd>T</kbd> 할 일 &nbsp; <kbd>C</kbd> 접기 &nbsp; <kbd>Del</kbd> 삭제 &nbsp; <kbd>F2</kbd> 수정 &nbsp; <kbd>⌘F</kbd> 검색</div>

<script>
// ── State ──
let nodes={},todoOrder=[],selId=null,panelOpen=false,isEditing=false;
let panX=0,panY=0,isPanning=false,panSt={x:0,y:0};
let lastTap=0,lastTapId=null;

const cvs=document.getElementById('canvas'),svg=document.getElementById('lines'),ctx=document.getElementById('ctx-menu');
const gid=()=>'n'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── Init ──
function init(){
  const s=localStorage.getItem('mindflow-data');
  if(s){try{const d=JSON.parse(s);nodes=d.nodes||{};panX=d.panX||0;panY=d.panY||0;
    todoOrder=d.todoOrder||[];
    Object.values(nodes).forEach(n=>{if(n.collapsed===undefined)n.collapsed=false});
  }catch(e){mkDefault()}}else mkDefault();
  syncTodoOrder();
  renderAll();
}
function mkDefault(){
  const id=gid();
  nodes={[id]:{id,label:'마인드맵',x:0,y:0,parent:null,children:[],
    isTodo:false,done:false,isRoot:true,collapsed:false}};
  panX=window.innerWidth/2;panY=window.innerHeight/2;todoOrder=[];
}
function save(){localStorage.setItem('mindflow-data',JSON.stringify({nodes,panX,panY,todoOrder}))}

function syncTodoOrder(){
  const active=new Set(Object.values(nodes).filter(n=>n.isTodo&&!n.done).map(n=>n.id));
  todoOrder=todoOrder.filter(id=>active.has(id));
  active.forEach(id=>{if(!todoOrder.includes(id))todoOrder.push(id)});
}

// ── Visibility ──
function isVis(id){let c=nodes[id];while(c&&c.parent){const p=nodes[c.parent];if(!p||p.collapsed)return false;c=p}return true}

// ── Hybrid Layout: Radial L1 (proportional) + Horizontal Tree L2+ ──
const BRANCH_R=180,H_MARGIN=40,V_GAP=14,NODE_H=42,MIN_BRANCH_GAP=60;

function estimateW(id){
  const n=nodes[id];if(!n)return 80;
  const labelW=n.label.length*12+28; // ~12px per char + padding
  let extra=0;
  if(n.isTodo)extra+=25;             // checkbox
  if(n.children.length>0)extra+=24;  // collapse btn
  if(n.isRoot)extra+=14;             // larger padding
  return Math.min(Math.max(labelW+extra,80),260);
}

function subtreeH(id){
  const n=nodes[id];if(!n)return NODE_H;
  const ch=n.collapsed?[]:n.children.filter(c=>nodes[c]);
  if(!ch.length)return NODE_H;
  let t=0;ch.forEach((c,i)=>{t+=subtreeH(c);if(i<ch.length-1)t+=V_GAP});
  return Math.max(NODE_H,t);
}

// Layout a branch: children extend in direction dir, centered on parent
function layoutBranch(id,dir){
  const n=nodes[id];if(!n)return;
  const ch=n.collapsed?[]:n.children.filter(c=>nodes[c]);
  if(!ch.length)return;

  let totalH=0;
  ch.forEach((c,i)=>{totalH+=subtreeH(c);if(i<ch.length-1)totalH+=V_GAP});

  const parentW=estimateW(id);
  let childY=n.y+NODE_H/2-totalH/2;

  ch.forEach(cid=>{
    const h=subtreeH(cid);
    const cn=nodes[cid];
    // Right: child left edge = parent left edge + parent width + margin
    // Left:  child left edge = parent left edge - child width - margin
    if(dir>=0) cn.x=n.x+parentW+H_MARGIN;
    else cn.x=n.x-estimateW(cid)-H_MARGIN;
    cn.y=childY+h/2-NODE_H/2;
    layoutBranch(cid,dir);
    childY+=h+V_GAP;
  });
}

function autoLayout(anchorId){
  const root=Object.values(nodes).find(n=>n.isRoot);
  if(!root)return;

  // Record anchor's screen position before layout
  const anchor=anchorId?nodes[anchorId]:null;
  let oldScreenX,oldScreenY;
  if(anchor){oldScreenX=anchor.x+panX;oldScreenY=anchor.y+panY}

  const rootW=estimateW(root.id);
  root.x=-rootW/2;root.y=-NODE_H/2;

  const L1=root.collapsed?[]:root.children.filter(c=>nodes[c]);
  if(!L1.length){
    if(!anchor){panX=window.innerWidth/2;panY=window.innerHeight/2}
    else{panX=oldScreenX-root.x;panY=oldScreenY-root.y}
    return;
  }

  const weights=L1.map(cid=>Math.max(subtreeH(cid),MIN_BRANCH_GAP));
  const totalWeight=weights.reduce((a,b)=>a+b,0);
  let curAngle=-Math.PI/2;

  L1.forEach((cid,i)=>{
    const sweep=(weights[i]/totalWeight)*2*Math.PI;
    const midAngle=curAngle+sweep/2;
    const cn=nodes[cid];
    const dir=Math.cos(midAngle)>=0?1:-1;
    const cw=estimateW(cid);
    const rx=BRANCH_R*Math.cos(midAngle);
    const ry=BRANCH_R*Math.sin(midAngle);
    cn.x=dir>=0?rx:rx-cw;
    cn.y=ry-NODE_H/2;
    layoutBranch(cid,dir);
    curAngle+=sweep;
  });

  // Restore anchor's screen position by adjusting pan
  if(anchor){panX=oldScreenX-anchor.x;panY=oldScreenY-anchor.y}
  else{panX=window.innerWidth/2;panY=window.innerHeight/2}
}

// ── Render ──
function renderOnly(){
  cvs.querySelectorAll('.node').forEach(e=>e.remove());
  Object.values(nodes).forEach(n=>{if(isVis(n.id))renderNode(n)});
  drawLines();updatePanel();save();
}
function renderAll(anchorId){
  autoLayout(anchorId||selId);
  renderOnly();
}

function renderNode(n){
  const el=document.createElement('div');
  el.className='node'+(n.isRoot?' root':'')+(n.isTodo?' todo':'')+(n.done?' done':'')+(n.id===selId?' selected':'');
  el.id='node-'+n.id;
  el.style.left=(n.x+panX)+'px';el.style.top=(n.y+panY)+'px';

  let h='<div class="node-inner">';
  if(n.isTodo)h+=`<div class="todo-check ${n.done?'checked':''}" data-action="check" data-nid="${n.id}"></div>`;
  h+=`<div class="node-label" data-id="${n.id}">${esc(n.label)}</div>`;
  if(n.children.length>0)h+=`<div class="collapse-btn" data-action="collapse" data-nid="${n.id}"><span class="arrow ${n.collapsed?'collapsed':''}">▾</span></div>`;
  h+=`<div class="node-actions"><button class="node-action-btn" data-action="add" data-nid="${n.id}">+</button>`;
  if(!n.isRoot)h+=`<button class="node-action-btn danger" data-action="del" data-nid="${n.id}">×</button>`;
  h+='</div>';
  if(n.collapsed&&n.children.length>0)h+=`<div class="children-count">${cntDesc(n.id)}</div>`;
  h+='</div>';
  el.innerHTML=h;

  // Click delegation
  el.addEventListener('click',e=>{
    const act=e.target.closest('[data-action]');
    if(!act)return;
    e.stopPropagation();
    const a=act.dataset.action,nid=act.dataset.nid;
    if(a==='check')togDone(nid);
    else if(a==='collapse')togColl(nid);
    else if(a==='add')addChildTo(nid);
    else if(a==='del')delNode(nid);
  });

  // Pointer events for selection + double-tap to edit
  el.addEventListener('pointerdown',e=>{
    if(e.target.closest('[data-action]'))return;
    e.stopPropagation();e.preventDefault();
    sel(n.id);

    // Double-tap detection
    const now=Date.now();
    if(lastTapId===n.id&&now-lastTap<400){editNode(n.id);lastTap=0;lastTapId=null;return;}
    lastTap=now;lastTapId=n.id;
  });

  el.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();sel(n.id);showCtx(e.clientX,e.clientY)});
  cvs.appendChild(el);
}

function cntDesc(id){const n=nodes[id];if(!n)return 0;let c=n.children.length;n.children.forEach(ch=>c+=cntDesc(ch));return c}

// ── Lines (smooth bezier) ──
function drawLines(){
  svg.innerHTML='';
  Object.values(nodes).forEach(n=>{
    if(!n.parent||!isVis(n.id))return;
    const p=nodes[n.parent];if(!p)return;
    const pE=document.getElementById('node-'+p.id),cE=document.getElementById('node-'+n.id);
    if(!pE||!cE)return;
    const pR=pE.getBoundingClientRect(),cR=cE.getBoundingClientRect();
    const x1=pR.left+pR.width/2,y1=pR.top+pR.height/2;
    const x2=cR.left+cR.width/2,y2=cR.top+cR.height/2;
    const dx=x2-x1;
    // Control points: horizontal bias for tree branches
    const cpOff=Math.abs(dx)*0.45+30;
    const dir=dx>=0?1:-1;
    const pa=document.createElementNS('http://www.w3.org/2000/svg','path');
    pa.setAttribute('d',`M${x1},${y1} C${x1+dir*cpOff},${y1} ${x2-dir*cpOff},${y2} ${x2},${y2}`);
    svg.appendChild(pa);
  });
}

// ── Selection ──
function sel(id){
  selId=id;cvs.querySelectorAll('.node').forEach(e=>e.classList.remove('selected'));
  const e=document.getElementById('node-'+id);if(e)e.classList.add('selected');
}

// ── Add ──
function addChild(){
  if(!selId){const r=Object.values(nodes).find(n=>n.isRoot);if(r)selId=r.id;else return}
  addChildTo(selId);
}
function addChildTo(pid){
  const p=nodes[pid];if(!p)return;
  if(p.collapsed)p.collapsed=false;
  const id=gid();
  nodes[id]={id,label:'새 노드',x:p.x+150,y:p.y,parent:pid,children:[],
    isTodo:false,done:false,isRoot:false,collapsed:false};
  p.children.push(id);
  renderAll(pid);sel(id);
  setTimeout(()=>editNode(id),80);
}
function addSibling(){if(!selId)return;const n=nodes[selId];if(!n||!n.parent)return;addChildTo(n.parent)}

// ── Edit ──
function editNode(id){
  const el=document.getElementById('node-'+id);if(!el)return;
  const lbl=el.querySelector('.node-label');
  isEditing=true;lbl.contentEditable=true;lbl.focus();
  const rng=document.createRange();rng.selectNodeContents(lbl);
  const s=window.getSelection();s.removeAllRanges();s.addRange(rng);

  const onKey=e=>{
    e.stopPropagation();
    if(e.key==='Enter'){e.preventDefault();lbl.blur()}
    if(e.key==='Escape'){lbl.textContent=nodes[id].label;lbl.blur()}
    if(e.key==='Tab')e.preventDefault();
  };
  const finish=()=>{
    lbl.removeEventListener('keydown',onKey,true);
    lbl.contentEditable=false;isEditing=false;
    const t=lbl.textContent.trim()||'노드';nodes[id].label=t;
    renderAll(id);
  };
  lbl.addEventListener('keydown',onKey,true);
  lbl.addEventListener('blur',finish,{once:true});
}

// ── Delete ──
function delNode(id){
  const n=nodes[id];if(!n||n.isRoot)return;
  const p=nodes[n.parent];if(p)p.children=p.children.filter(c=>c!==id);
  const rm=nid=>{const nd=nodes[nid];if(!nd)return;nd.children.forEach(c=>rm(c));delete nodes[nid]};
  rm(id);if(selId===id)selId=n.parent;
  syncTodoOrder();renderAll(n.parent);
}

// ── Todo / Collapse ──
function toggleTodoSel(){if(!selId)return;const n=nodes[selId];if(!n||n.isRoot)return;
  n.isTodo=!n.isTodo;if(!n.isTodo){n.done=false;delete n.doneAt}syncTodoOrder();renderAll();sel(selId)}
function togDone(id){const n=nodes[id];if(!n)return;
  n.done=!n.done;
  if(n.done)n.doneAt=Date.now();
  else delete n.doneAt;
  syncTodoOrder();renderAll();if(selId)sel(selId)}
function togColl(id){const n=nodes[id];if(!n||n.children.length===0)return;
  n.collapsed=!n.collapsed;renderAll(id);sel(id)}
function toggleCollapseSel(){if(selId)togColl(selId)}

// ── Todo Panel ──
function togglePanel(){panelOpen=!panelOpen;document.getElementById('todo-panel').classList.toggle('open',panelOpen)}

function updatePanel(){
  const list=document.getElementById('todo-list');
  syncTodoOrder();
  const todos=todoOrder.map(id=>nodes[id]).filter(n=>n&&n.isTodo&&!n.done);
  const dones=Object.values(nodes).filter(n=>n.isTodo&&n.done);
  document.getElementById('todo-count').textContent=todos.length;

  let html='';

  // Active todos
  if(!todos.length&&!dones.length){
    html='<div class="todo-empty">할 일이 없어요.<br><br>노드를 선택하고 <kbd style="background:var(--surface2);border:1px solid var(--border);padding:1px 5px;border-radius:3px;font-size:10px">T</kbd> 키를 눌러<br>할 일로 만들 수 있어요.</div>';
  } else if(!todos.length){
    html='<div class="todo-empty" style="padding:20px">모든 할 일을 완료했어요!</div>';
  } else {
    html=todos.map((n,i)=>{
      const pa=getPath(n.id);
      return `<div class="todo-item" data-todoid="${n.id}" data-idx="${i}">
        <div class="drag-handle" data-draghandle="1">⠿</div>
        <div class="todo-check" onclick="event.stopPropagation();togDone('${n.id}')"></div>
        <div style="flex:1;min-width:0" onclick="focusNode('${n.id}')">
          <div class="todo-item-label">${esc(n.label)}</div>
          <div class="path">${pa}</div>
        </div>
      </div>`;
    }).join('');
  }

  // Completed section — hierarchical: year > month > day
  if(dones.length){
    dones.sort((a,b)=>(b.doneAt||0)-(a.doneAt||0));
    const collapsed=getDoneCollapsed();
    const showDone=localStorage.getItem('mindflow-showdone')!=='false';

    // Build tree: { year: { month: { day: [nodes] } } }
    const tree={};const undated=[];
    dones.forEach(n=>{
      if(!n.doneAt){undated.push(n);return}
      const d=new Date(n.doneAt);
      const y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate();
      if(!tree[y])tree[y]={};
      if(!tree[y][m])tree[y][m]={};
      if(!tree[y][m][day])tree[y][m][day]=[];
      tree[y][m][day].push(n);
    });

    html+=`<div class="done-section">
      <div class="done-section-header" onclick="toggleDoneSection()">
        <h3><span class="toggle-arrow ${showDone?'':'collapsed'}">▾</span> 완료 (${dones.length})</h3>
      </div>`;

    if(showDone){
      // Years descending
      const years=Object.keys(tree).map(Number).sort((a,b)=>b-a);
      years.forEach(y=>{
        const yKey='y:'+y;
        const yOpen=!collapsed.has(yKey);
        const yCount=Object.values(tree[y]).reduce((s,m)=>s+Object.values(m).reduce((s2,d)=>s2+d.length,0),0);
        html+=`<div class="dtree-node">
          <div class="dtree-row dtree-y" onclick="toggleDateGroup('${yKey}')">
            <span class="toggle-arrow" style="${yOpen?'':'transform:rotate(-90deg)'}">▾</span>
            ${y}년 <span class="dtree-count">${yCount}</span>
          </div>`;
        if(yOpen){
          const months=Object.keys(tree[y]).map(Number).sort((a,b)=>b-a);
          months.forEach(m=>{
            const mKey='m:'+y+'-'+m;
            const mOpen=!collapsed.has(mKey);
            const mCount=Object.values(tree[y][m]).reduce((s,d)=>s+d.length,0);
            html+=`<div class="dtree-node" style="padding-left:12px">
              <div class="dtree-row dtree-m" onclick="toggleDateGroup('${mKey}')">
                <span class="toggle-arrow" style="${mOpen?'':'transform:rotate(-90deg)'}">▾</span>
                ${m}월 <span class="dtree-count">${mCount}</span>
              </div>`;
            if(mOpen){
              const days=Object.keys(tree[y][m]).map(Number).sort((a,b)=>b-a);
              days.forEach(day=>{
                const dKey='d:'+y+'-'+m+'-'+day;
                const dOpen=!collapsed.has(dKey);
                const items=tree[y][m][day];
                const dayLabel=getDayLabel(y,m,day);
                html+=`<div class="dtree-node" style="padding-left:12px">
                  <div class="dtree-row dtree-d" onclick="toggleDateGroup('${dKey}')">
                    <span class="toggle-arrow" style="${dOpen?'':'transform:rotate(-90deg)'}">▾</span>
                    ${dayLabel} <span class="dtree-count">${items.length}</span>
                  </div>`;
                if(dOpen){
                  items.forEach(n=>{
                    const pa=getPath(n.id);
                    html+=`<div class="done-item" onclick="focusNode('${n.id}')">
                      <div class="todo-check checked" onclick="event.stopPropagation();togDone('${n.id}')"></div>
                      <div style="flex:1;min-width:0">
                        <div class="done-item-label">${esc(n.label)}</div>
                        <div class="path">${pa}</div>
                      </div>
                    </div>`;
                  });
                }
                html+='</div>';
              });
            }
            html+='</div>';
          });
        }
        html+='</div>';
      });

      // Undated
      if(undated.length){
        const uKey='undated';
        const uOpen=!collapsed.has(uKey);
        html+=`<div class="dtree-node">
          <div class="dtree-row dtree-y" onclick="toggleDateGroup('${uKey}')">
            <span class="toggle-arrow" style="${uOpen?'':'transform:rotate(-90deg)'}">▾</span>
            날짜 미상 <span class="dtree-count">${undated.length}</span>
          </div>`;
        if(uOpen){
          undated.forEach(n=>{
            const pa=getPath(n.id);
            html+=`<div class="done-item" style="padding-left:12px" onclick="focusNode('${n.id}')">
              <div class="todo-check checked" onclick="event.stopPropagation();togDone('${n.id}')"></div>
              <div style="flex:1;min-width:0">
                <div class="done-item-label">${esc(n.label)}</div>
                <div class="path">${pa}</div>
              </div>
            </div>`;
          });
        }
        html+='</div>';
      }
    }
    html+='</div>';
  }

  list.innerHTML=html;
  initTodoDrag();
}

function getDayLabel(y,m,d){
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const target=new Date(y,m-1,d);
  const diff=Math.floor((today-target)/(1000*60*60*24));
  if(diff===0)return `${d}일 (오늘)`;
  if(diff===1)return `${d}일 (어제)`;
  return `${d}일`;
}

function toggleDoneSection(){
  const cur=localStorage.getItem('mindflow-showdone')!=='false';
  localStorage.setItem('mindflow-showdone',!cur);
  updatePanel();
}

function getDoneCollapsed(){
  try{return new Set(JSON.parse(localStorage.getItem('mindflow-donecoll')||'[]'))}
  catch(e){return new Set()}
}

function toggleDateGroup(date){
  const s=getDoneCollapsed();
  if(s.has(date))s.delete(date);else s.add(date);
  localStorage.setItem('mindflow-donecoll',JSON.stringify([...s]));
  updatePanel();
}

function getPath(id){const ps=[];let c=nodes[id];while(c&&c.parent){c=nodes[c.parent];if(c)ps.unshift(c.label)}return ps.join(' › ')}

function focusNode(id){
  const n=nodes[id];if(!n)return;
  let c=nodes[id];while(c&&c.parent){const p=nodes[c.parent];if(p&&p.collapsed)p.collapsed=false;c=p}
  autoLayout();
  panX=window.innerWidth/2-n.x-estimateW(id)/2;
  panY=window.innerHeight/2-n.y-NODE_H/2;
  sel(id);renderOnly();sel(id);
}

// ── Todo Drag-and-Drop Reorder ──
function initTodoDrag(){
  const list=document.getElementById('todo-list');
  const items=list.querySelectorAll('.todo-item');
  let dragItem=null,dragIdx=-1,placeholder=null;

  items.forEach(item=>{
    const handle=item.querySelector('[data-draghandle]');

    const onStart=e=>{
      e.preventDefault();e.stopPropagation();
      dragItem=item;dragIdx=parseInt(item.dataset.idx);
      item.classList.add('dragging');
      item.style.position='relative';item.style.zIndex='10';
    };

    handle.addEventListener('pointerdown',e=>{
      onStart(e);
      handle.setPointerCapture(e.pointerId);

      const onMove=ev=>{
        if(!dragItem)return;
        const listRect=list.getBoundingClientRect();
        const y=ev.clientY-listRect.top+list.scrollTop;

        const allItems=[...list.querySelectorAll('.todo-item:not(.dragging)')];
        let insertBefore=-1;
        for(let i=0;i<allItems.length;i++){
          const r=allItems[i].getBoundingClientRect();
          const mid=r.top+r.height/2;
          if(ev.clientY<mid){insertBefore=i;break;}
        }

        // Remove old indicators
        list.querySelectorAll('.todo-drop-indicator').forEach(el=>el.remove());

        // Add indicator
        const ind=document.createElement('div');
        ind.className='todo-drop-indicator visible';
        if(insertBefore>=0&&allItems[insertBefore]){
          list.insertBefore(ind,allItems[insertBefore]);
        } else {
          list.appendChild(ind);
        }

        dragItem._insertBefore=insertBefore;
      };

      const onEnd=()=>{
        handle.removeEventListener('pointermove',onMove);
        handle.removeEventListener('pointerup',onEnd);
        handle.removeEventListener('pointercancel',onEnd);
        list.querySelectorAll('.todo-drop-indicator').forEach(el=>el.remove());
        if(!dragItem)return;

        dragItem.classList.remove('dragging');
        dragItem.style.position='';dragItem.style.zIndex='';

        const ib=dragItem._insertBefore;
        if(ib!==undefined&&ib!==-1){
          // Calculate new position in todoOrder
          const activeTodos=todoOrder.filter(id=>{const n=nodes[id];return n&&n.isTodo&&!n.done});
          const movedId=activeTodos[dragIdx];
          if(movedId){
            const filtered=activeTodos.filter(id=>id!==movedId);
            const adjustedIdx=ib>dragIdx?ib-1:ib;
            filtered.splice(Math.min(adjustedIdx,filtered.length),0,movedId);
            // Rebuild todoOrder: keep done/inactive, replace active order
            const activeSet=new Set(filtered);
            todoOrder=todoOrder.filter(id=>!activeSet.has(id));
            filtered.forEach((id,i)=>todoOrder.splice(todoOrder.length,0,id));
            todoOrder=[...filtered,...todoOrder.filter(id=>!activeSet.has(id))];
          }
        } else if(ib===undefined||ib===-1){
          // Moved to end
          const activeTodos=todoOrder.filter(id=>{const n=nodes[id];return n&&n.isTodo&&!n.done});
          const movedId=activeTodos[dragIdx];
          if(movedId){
            todoOrder=todoOrder.filter(id=>id!==movedId);
            todoOrder.push(movedId);
          }
        }

        dragItem=null;
        save();updatePanel();
      };

      handle.addEventListener('pointermove',onMove);
      handle.addEventListener('pointerup',onEnd);
      handle.addEventListener('pointercancel',onEnd);
    });
  });
}

// ── Context Menu ──
function showCtx(x,y){ctx.style.left=Math.min(x,window.innerWidth-200)+'px';
  ctx.style.top=Math.min(y,window.innerHeight-250)+'px';ctx.classList.add('show')}
function hideCtx(){ctx.classList.remove('show')}
function ctxAct(a){hideCtx();if(!selId)return;
  ({child:()=>addChildTo(selId),sibling:addSibling,todo:toggleTodoSel,
    collapse:()=>togColl(selId),edit:()=>editNode(selId),delete:()=>delNode(selId)})[a]()}

// ── Export / Import ──
function exportJSON(){
  const d=JSON.stringify({nodes,panX,panY,todoOrder},null,2);
  const b=new Blob([d],{type:'application/json'}),u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download='mindflow-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(u);toast('마인드맵을 저장했어요');
}
function importJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.nodes){nodes=d.nodes;panX=d.panX||0;panY=d.panY||0;
    todoOrder=d.todoOrder||[];
    Object.values(nodes).forEach(n=>{if(n.collapsed===undefined)n.collapsed=false});
    syncTodoOrder();renderAll();toast('마인드맵을 불러왔어요')}}catch(err){toast('파일을 읽을 수 없어요')}};
  r.readAsText(f);e.target.value='';
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

// ── Canvas Pan (pointer events for touch) ──
cvs.addEventListener('pointerdown',e=>{
  if(e.target!==cvs&&e.target!==svg&&!e.target.closest('svg#lines'))return;
  isPanning=true;panSt.x=e.clientX-panX;panSt.y=e.clientY-panY;

window.addEventListener('pointermove',e=>{

window.addEventListener('pointerup',e=>{

function reposAll(){
  Object.values(nodes).forEach(n=>{const el=document.getElementById('node-'+n.id);
    if(el){el.style.left=(n.x+panX)+'px';el.style.top=(n.y+panY)+'px'}});

// ── Search ──
let searchOpen=false,searchIdx=-1,searchResults=[];

function toggleSearch(){
  searchOpen=!searchOpen;
  const bar=document.getElementById('search-bar');
  bar.classList.toggle('open',searchOpen);
  if(searchOpen){
    const inp=document.getElementById('search-input');
    inp.value='';inp.focus();
    document.getElementById('search-results').innerHTML='';
    searchResults=[];searchIdx=-1;
  } else {
    clearSearchHighlight();
  }
}

function clearSearchHighlight(){
  cvs.querySelectorAll('.node.search-highlight').forEach(el=>el.classList.remove('search-highlight'));
}

function doSearch(q){
  const res=document.getElementById('search-results');
  clearSearchHighlight();
  if(!q.trim()){res.innerHTML='';searchResults=[];searchIdx=-1;return}
  const lower=q.toLowerCase();
  searchResults=Object.values(nodes).filter(n=>n.label.toLowerCase().includes(lower));
  searchIdx=-1;

  if(!searchResults.length){
    res.innerHTML='<div class="search-empty">결과 없음</div>';
    return;
  }

  res.innerHTML=searchResults.map((n,i)=>{
    const path=getPath(n.id);
    const hl=n.label.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark>$1</mark>');
    return `<div class="search-result" data-idx="${i}" onclick="searchGo(${i})">
      <span class="sr-label">${hl}</span>
      <span class="sr-path">${path||'(루트)'}</span>
    </div>`;
  }).join('');
}

function searchGo(idx){
  if(idx<0||idx>=searchResults.length)return;
  searchIdx=idx;
  const n=searchResults[idx];
  focusNode(n.id);

  // Highlight
  clearSearchHighlight();
  const el=document.getElementById('node-'+n.id);
  if(el)el.classList.add('search-highlight');

  // Mark active in list
  document.querySelectorAll('.search-result').forEach(el=>el.classList.remove('active'));
  const active=document.querySelector(`.search-result[data-idx="${idx}"]`);
  if(active){active.classList.add('active');active.scrollIntoView({block:'nearest'})}
}

document.getElementById('search-input').addEventListener('input',e=>doSearch(e.target.value));
document.getElementById('search-input').addEventListener('keydown',e=>{
  e.stopPropagation();
  if(e.key==='Escape'){toggleSearch();return}
  if(e.key==='Enter'){
    e.preventDefault();
    if(searchResults.length){searchGo(searchIdx<0?0:(searchIdx+1)%searchResults.length)}
    return;
  }
  if(e.key==='ArrowDown'){
    e.preventDefault();
    if(searchResults.length){searchGo(Math.min(searchIdx+1,searchResults.length-1))}
    return;
  }
  if(e.key==='ArrowUp'){
    e.preventDefault();
    if(searchResults.length){searchGo(Math.max(searchIdx-1,0))}
    return;
  }
});

// ── Keyboard ──
window.addEventListener('keydown',e=>{
  if(isEditing)return;
  if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();toggleSearch();return}
  if(searchOpen)return;
  if(e.key==='Tab'){e.preventDefault();addChild()}
  if(e.key==='Enter'){e.preventDefault();addSibling()}
  if(e.key==='t'||e.key==='T')toggleTodoSel();
  if(e.key==='c'||e.key==='C')toggleCollapseSel();
  if(e.key==='Delete'||e.key==='Backspace'){if(selId)delNode(selId)}
  if(e.key==='F2'){e.preventDefault();if(selId)editNode(selId)}
  if(e.key==='Escape')hideCtx();
});
window.addEventListener('click',e=>{
  if(!e.target.closest('.ctx-menu'))hideCtx();
  if(searchOpen&&!e.target.closest('#search-bar')&&!e.target.closest('.tb-btn'))toggleSearch();
});

init();
</script>
</body>
</html>
